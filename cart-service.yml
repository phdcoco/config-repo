# cart-service.yml — spring.application.name=cart-service 인 서비스에게만 배달된다.
server:
  port: 8085

spring:
  # 서비스마다 자기만의 DB를 갖는다 (Database per Service)
  datasource:
    url: jdbc:h2:mem:cartdb;DB_CLOSE_DELAY=-1
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# cart 는 상품 검증을 위해 product-service 를 HTTP 로 호출한다.
# 하드코딩 주소 대신 Eureka 논리 이름 (@LoadBalanced 가 실제 주소로 치환).
cart:
  client:
    product-base-url: http://product-service
