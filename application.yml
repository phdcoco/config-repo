eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    refresh:
      enable: false # Eureka 클라이언트는 건드리지 않고 필요한 부분만 갈아끼움

# 모든 서비스가 /actuator/refresh 로 무중단 설정 갱신을 쓸 수 있게 공통 노출.
management:
  endpoints:
    web:
      exposure:
        include: refresh
  endpoint:
    refresh:
      access: unrestricted